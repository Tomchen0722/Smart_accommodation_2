<html lang="zh-Hant">
<head>
<meta charset="utf-8">

<style>
  :root{--bg:#F8F7F5;--ink:#2A2A2A;--muted:#9A9490;--blue:#4E7FB0;
        --green:#5B9E73;--purple:#8B7BA8;--surface:#fff;--border:#E8E4DE;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{background:radial-gradient(1200px 700px at 50% 32%,#FEFDFB,#F1EFEA 70%,#E8E4DE);
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    color:var(--ink);overflow:hidden;}
  .dock{position:fixed;top:18px;right:4em;left:auto;z-index:50;
    display:flex;gap:14px;align-items:flex-end;padding:8px 14px;border-radius:20px;
    background:rgba(255,255,255,.72);backdrop-filter:blur(10px);
    border:1px solid var(--border);box-shadow:0 8px 30px rgba(0,0,0,.10);}
  .dockit{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;
    padding:6px 14px;border-radius:14px;transition:transform .15s cubic-bezier(.2,.8,.2,1),background .2s;
    transform-origin:bottom center;color:var(--ink);}
  .dockit:hover{background:rgba(78,127,176,.10);}
  .dockit .ic{font-size:1.5rem;line-height:1;}
  .dockit .tx{font-size:.72rem;font-weight:700;white-space:nowrap;}
  .stage{position:fixed;inset:0;z-index:1;}
  .card{position:absolute;left:50%;top:46%;width:118px;height:84px;
    margin-left:-59px;margin-top:-42px;border-radius:12px;opacity:0;
    transform:translate(0,0) scale(0);pointer-events:none;
    transition:transform 1.15s cubic-bezier(.22,.75,.2,1),opacity .8s ease;
    perspective:700px;will-change:transform;}
  .flip{position:relative;width:100%;height:100%;transform-style:preserve-3d;
    transition:transform .6s cubic-bezier(.3,.7,.2,1);border-radius:12px;
    box-shadow:0 6px 18px rgba(0,0,0,.16);}
  .card.on{cursor:pointer;}
  .card.on:hover .flip{transform:rotateY(180deg);}
  .face{position:absolute;inset:0;border-radius:12px;overflow:hidden;
    backface-visibility:hidden;border:2px solid #fff;}
  .front img{width:100%;height:100%;object-fit:cover;display:block;background:#e7e3dc;}
  .back{transform:rotateY(180deg);background:linear-gradient(160deg,var(--blue),var(--green));
    display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;gap:3px;}
  .back .vd{font-size:.82rem;font-weight:800;letter-spacing:.04em;}
  .back .dd{font-size:.64rem;opacity:.9;}
  .center{position:fixed;left:50%;top:46%;transform:translate(-50%,-50%);z-index:5;
    display:flex;flex-direction:column;align-items:center;text-align:center;
    opacity:0;transition:opacity 1.6s ease;pointer-events:none;}
  .center.show{opacity:1;}
  .logo{width:180px;height:auto;margin-bottom:10px;
    filter:drop-shadow(0 12px 26px rgba(0,0,0,.14));}
  .logofb{width:110px;height:110px;border-radius:24px;margin-bottom:12px;
    background:linear-gradient(160deg,#7ED6E8,#BFE08A 55%,#F7D774);
    display:none;align-items:center;justify-content:center;font-size:3.4rem;
    box-shadow:0 10px 30px rgba(0,0,0,.14);}
  h1.title{font-size:2.6rem;font-weight:800;letter-spacing:-.5px;color:var(--ink);min-height:3.1rem;}
  h1.title .cur{border-right:3px solid var(--blue);animation:blink 1s step-end infinite;}
  @keyframes blink{50%{border-color:transparent;}}
  .subline{position:fixed;left:50%;transform:translateX(-50%);z-index:6;
    font-size:.92rem;color:var(--muted);letter-spacing:.02em;text-align:center;
    max-width:640px;padding:0 16px;opacity:0;transition:opacity .8s ease;}
  .statbar{position:fixed;bottom:0;left:0;width:100%;z-index:7;padding:12px 10px 16px;
    text-align:center;opacity:0;transition:opacity 1s ease .3s;
    background:linear-gradient(0deg,rgba(248,247,245,.96) 62%,rgba(248,247,245,0));}
</style>
</head>

function vw(){return window.innerWidth;} function vh(){return window.innerHeight;}
function set(c,x,y,r,s,o){ c.style.transform=`translate(${x}px,${y}px) rotate(${r}deg) scale(${s})`; c.style.opacity=o; }
function pC(){ cards.forEach(c=>set(c,0,0,(Math.random()*80-40),0,0)); }
function pB(){ cards.forEach(c=>set(c,(Math.random()*.86-.43)*vw(),(Math.random()*.80-.40)*vh(),(Math.random()*50-25),1,1)); }
function pR(){ const sp=Math.min(76,(vw()*0.94)/N), sc=Math.max(.5,Math.min(.8,sp/118*1.5));
  cards.forEach((c,i)=>set(c,(i-(N-1)/2)*sp,0,0,sc,1)); }
function pCircle(){
  const R=Math.min(vw(),vh())*0.35;
  cards.forEach((c,i)=>{ const a=i/N*2*Math.PI-Math.PI/2; set(c,Math.cos(a)*R,Math.sin(a)*R*0.92,0,0.8,1); });
  document.getElementById('center').classList.add('show');
  const sub=document.getElementById('sub'); sub.style.top=(vh()*0.46+R*0.92+40)+'px'; sub.style.opacity=1;
  document.getElementById('statbar').style.opacity=1;
  setTimeout(()=>cards.forEach(c=>{c.classList.add('on');c.style.pointerEvents='auto';}),1100);
  typeTitle();
}

// ── 點照片 → 開新視窗顯示完整房源詳情 ──
function openDetail(L){
  const w=window.open('','_blank','width=660,height=920'); if(!w) return;
  const star=(L.rating!=null)?('⭐ '+L.rating):'⭐ 無評分';
  let cc;
  if(L.clarity){ const c=L.clarity, col=c.label=='清晰'?'#5B9E73':(c.label=='尚可'?'#C49A4A':'#C4645A');
    cc=`<div style="border:1px solid #E8E4DE;border-top:3px solid ${col};border-radius:12px;padding:14px 16px;">
      <div style="font-size:.72rem;color:#9A9490;">AI 照片清晰度</div>
      <div style="font-size:1.6rem;font-weight:800;color:${col};">${c.label}</div>
      <div style="font-size:.74rem;color:#9A9490;">清晰機率 ${Math.round(c.prob*100)}%</div></div>
     <div style="display:flex;gap:10px;margin-top:10px;">
      <div style="flex:1;border:1px solid #E8E4DE;border-radius:12px;padding:12px;"><div style="font-size:.68rem;color:#9A9490;">LAPLACIAN</div><div style="font-size:1.3rem;font-weight:800;">${Math.round(c.lap).toLocaleString()}</div></div>
      <div style="flex:1;border:1px solid #E8E4DE;border-radius:12px;padding:12px;"><div style="font-size:.68rem;color:#9A9490;">解析度</div><div style="font-size:1.3rem;font-weight:800;">${c.mp} MP</div></div></div>`;
  } else { cc=`<div style="border:1px solid #E8E4DE;border-radius:12px;padding:16px;color:#9A9490;font-size:.82rem;line-height:1.7;">AI 照片清晰度<br>（部署於伺服器時自動分析）</div>`; }
  const ams=(L.amenities||[]);
  const amChips = ams.length ? ams.map(a=>`<span style="display:inline-block;background:#F2F0EC;border:1px solid #E8E4DE;border-radius:14px;padding:4px 12px;margin:4px 5px 0 0;font-size:.76rem;color:#505050;">${a}</span>`).join('') : '<span style="color:#9A9490;font-size:.82rem;">此房源未列出設施</span>';
  const nb=(L.nearby||[]);
  const nbRows = nb.map(x=>`<tr><td style="padding:8px 10px;border-bottom:1px solid #eee;">${x.poi}</td><td style="padding:8px 10px;border-bottom:1px solid #eee;">${(x.count).toLocaleString()}</td><td style="padding:8px 10px;border-bottom:1px solid #eee;">${x.near}</td><td style="padding:8px 10px;border-bottom:1px solid #eee;">${x.dist}</td></tr>`).join('');
  const doc=`<!DOCTYPE html><meta charset="utf-8"><title>房源詳情 · #${L.id}</title>
   <body style="margin:0;font-family:'Noto Sans TC','PingFang TC',sans-serif;background:#F8F7F5;color:#2A2A2A;">
    <div style="max-width:620px;margin:0 auto;padding:20px 20px 44px;">
     <div style="font-size:1.3rem;font-weight:800;margin-bottom:10px;">🏠 房源詳情</div>
     <div style="font-size:1.05rem;font-weight:800;line-height:1.5;">${L.name}</div>
     <div style="color:#9A9490;font-size:.86rem;line-height:2;margin-top:8px;">
       📍 區域位置：${L.district}<br>🧭 座標：${L.lat}, ${L.lon}<br>
       🛏 ${L.room} ｜ 👥 可住 ${L.acc} 人 ｜ 🛁 ${L.bath} 衛浴 ｜ 🛏 ${L.beds} 床</div>
     <div style="margin-top:8px;font-size:1.05rem;">💰 <b style="color:#5B9E73;">$${L.price.toLocaleString()}</b> / 晚 ｜ ${star} ｜ 💬 ${L.reviews} 則評論</div>
     <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px;align-items:start;">
       <div><img referrerpolicy="no-referrer" src="${L.img}" style="width:100%;height:200px;object-fit:cover;border-radius:12px;background:#e7e3dc;"><div style="text-align:center;font-size:.74rem;color:#9A9490;margin-top:4px;">房源封面照片</div></div>
       <div>${cc}</div></div>
     <div style="margin-top:10px;"><a href="${L.img}" target="_blank" style="color:#5B9E73;font-weight:700;text-decoration:none;">🖼 開新視窗檢視原圖 ↗</a></div>
     <div style="display:flex;gap:12px;margin-top:16px;">
       <button id="rent" style="flex:1;padding:12px;border:none;border-radius:10px;cursor:pointer;background:#5B9E73;color:#fff;font-weight:800;font-size:.92rem;">🏠 立即租房</button>
       <button id="fav" style="flex:1;padding:12px;border:none;border-radius:10px;cursor:pointer;background:#C4645A;color:#fff;font-weight:800;font-size:.92rem;">❤️ 加入收藏</button></div>
     <div id="msg" style="margin-top:12px;min-height:1.3rem;font-size:.92rem;font-weight:700;text-align:center;"></div>
     <div style="margin-top:22px;font-size:.78rem;font-weight:800;color:#9A9490;letter-spacing:.1em;border-bottom:1px solid #E8E4DE;padding-bottom:6px;">房源設施（共 ${ams.length} 項）</div>
     <div style="margin-top:10px;line-height:2.2;">${amChips}</div>
     <div style="margin-top:22px;font-size:.78rem;font-weight:800;color:#9A9490;letter-spacing:.1em;border-bottom:1px solid #E8E4DE;padding-bottom:6px;">周遭附近設施（1KM 範圍）</div>
     <table style="width:100%;border-collapse:collapse;font-size:.82rem;margin-top:8px;background:#fff;border:1px solid #E8E4DE;border-radius:10px;overflow:hidden;">
       <tr style="background:#F2F0EC;color:#9A9490;text-align:left;"><th style="padding:8px 10px;">設施類型</th><th style="padding:8px 10px;">1KM 數量</th><th style="padding:8px 10px;">最近地點</th><th style="padding:8px 10px;">最近距離</th></tr>
       ${nbRows}
     </table>
    </div>
    <script>
     document.getElementById('rent').onclick=function(){var m=document.getElementById('msg');m.style.color='#3D7A55';m.textContent='✅ 已送出租房申請！';};
     document.getElementById('fav').onclick=function(){var m=document.getElementById('msg');m.style.color='#C4645A';m.textContent='❤️ 已加入收藏清單！';};
    <\/script>
   </body>`;
  w.document.open(); w.document.write(doc); w.document.close();
}
</script>
</body>
