<!doctype html><meta charset="utf-8">
<style>
  body{background:#F8F7F5;display:flex;gap:20px;padding:40px;font-family:sans-serif;}
  .card{width:130px;height:165px;perspective:700px;}
  .flip{position:relative;width:100%;height:100%;transform-style:preserve-3d;
    transition:transform .6s cubic-bezier(.3,.7,.2,1);border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,.16);}
  .card.on:hover .flip{transform:rotateY(180deg);}
  .face{position:absolute;inset:0;border-radius:12px;overflow:hidden;backface-visibility:hidden;border:2px solid #fff;}
  .front img{width:100%;height:100%;object-fit:cover;display:block;}
  .back{transform:rotateY(180deg);background:linear-gradient(160deg,#4E7FB0,#5B9E73);
    display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;gap:4px;}
  .back .vd{font-size:.9rem;font-weight:800;letter-spacing:.04em;} .back .dd{font-size:.68rem;opacity:.9;}
</style>
<div class="card on"><div class="flip">
  <div class="face front"><img src="https://picsum.photos/seed/a/300/400"></div>
  <div class="face back"><div class="vd">View Details</div><div class="dd">Taipei · Da'an</div></div>
</div></div>
<div class="card on"><div class="flip">
  <div class="face front"><img src="https://picsum.photos/seed/b/300/400"></div>
  <div class="face back"><div class="vd">View Details</div><div class="dd">Taipei · Xinyi</div></div>
</div></div>
